<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CSV Zoeker</title>
<style>
body{font-family:Segoe UI,Arial,sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:20px}
.wrap{max-width:1100px;margin:auto}
input[type=text]{width:100%;padding:16px;font-size:20px;border-radius:10px;border:1px solid #334155;background:#111827;color:white}
button{padding:12px 18px;border:0;border-radius:8px;cursor:pointer;background:#2563eb;color:white}
.row{padding:12px;border-bottom:1px solid #334155;cursor:pointer}
.row:hover{background:#1e293b}
.small{color:#94a3b8;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
<h1>CSV Zoeker</h1>
<button id="loadBtn">CSV laden</button>
<input id="fileInput" type="file" accept=".csv" style="display:none">
<p id="status">Geen CSV geladen</p>
<input id="search" type="text" placeholder="Zoeken...">
<div id="results"></div>
</div>
<script>
let DATA=[];
const DBNAME='CSVZoekerDB';
const STORE='files';

function openDB(){
 return new Promise((resolve,reject)=>{
  const req=indexedDB.open(DBNAME,1);
  req.onupgradeneeded=()=>req.result.createObjectStore(STORE);
  req.onsuccess=()=>resolve(req.result);
  req.onerror=()=>reject(req.error);
 });
}

async function saveCSV(text,name){
 const db=await openDB();
 const tx=db.transaction(STORE,'readwrite');
 tx.objectStore(STORE).put({text,name},'current');
}

async function loadSavedCSV(){
 const db=await openDB();
 return new Promise(resolve=>{
  const tx=db.transaction(STORE,'readonly');
  const req=tx.objectStore(STORE).get('current');
  req.onsuccess=()=>resolve(req.result);
  req.onerror=()=>resolve(null);
 });
}

function parseCSV(text){
 const rows=text.split(/\r?\n/).filter(Boolean).map(r=>r.split(';'));
 if(rows.length<2) return [];
 const header=rows.shift();
 const idxNaam=header.findIndex(h=>/naam/i.test(h));
 const idxLat=header.findIndex(h=>/(lat|latitude)/i.test(h));
 const idxLon=header.findIndex(h=>/(lon|longitude)/i.test(h));
 return rows.map(r=>{
   const raw=(r[idxNaam]||'');
   const p=raw.split(/\s*,\s*/);
   return {
    nummer:p[0]||'', naam:p[1]||'', straat:p[2]||'', huisnr:p[3]||'', pc:p[4]||'', plaats:p[5]||'',
    lat:parseFloat((r[idxLat]||'').replace(',','.')),
    lon:parseFloat((r[idxLon]||'').replace(',','.')),
    raw:raw
   };
 });
}

function render(q=''){
 q=q.toLowerCase();
 const out=document.getElementById('results');
 out.innerHTML='';
 const res=DATA.filter(x=>!q || (x.raw||'').toLowerCase().includes(q)).slice(0,300);
 for(const r of res){
  const d=document.createElement('div');
  d.className='row';
  d.innerHTML=`<b>${r.nummer}</b> ${r.naam}<div class='small'>${r.straat} ${r.huisnr} ${r.pc} ${r.plaats}</div>`;
  d.onclick=()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lon}`,'_blank');
  out.appendChild(d);
 }
 document.getElementById('status').textContent=`${res.length} resultaten - dataset bevat ${DATA.length} regels`;
}

document.getElementById('search').addEventListener('input',e=>render(e.target.value));

document.getElementById('loadBtn').onclick=()=>{
 const code=prompt('Voer code in');
 if(code!=='445566'){ alert('Onjuiste code'); return; }
 document.getElementById('fileInput').click();
};

document.getElementById('fileInput').addEventListener('change', async e=>{
 const f=e.target.files[0];
 if(!f) return;
 const text=await f.text();
 await saveCSV(text,f.name);
 DATA=parseCSV(text);
 render();
});

(async()=>{
 const saved=await loadSavedCSV();
 if(saved){
  DATA=parseCSV(saved.text);
  document.getElementById('status').textContent='Dataset geladen: '+saved.name;
  render();
 }
})();
</script>
</body>
</html>
