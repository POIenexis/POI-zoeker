<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Locatie Zoeker</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:#e5e7eb;
    font-family:Segoe UI,Arial,sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

#status{
    margin-bottom:15px;
    color:#94a3b8;
}

#search{
    width:100%;
    box-sizing:border-box;
    padding:18px;
    font-size:22px;
    border-radius:12px;
    border:1px solid #334155;
    background:#111827;
    color:white;
    margin-bottom:20px;
}

.row{
    border-bottom:1px solid #334155;
    padding:14px;
    cursor:pointer;
}

.row:hover{
    background:#1e293b;
}

.code{
    color:#60a5fa;
    font-weight:bold;
    font-size:18px;
}

.small{
    color:#94a3b8;
    font-size:12px;
}

.bestand{
    color:#22c55e;
    font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<h1>Locatie Zoeker</h1>

<div id="status">
Bestanden laden...
</div>

<input
    id="search"
    type="text"
    placeholder="Zoek station, verdeelkast, gasstation, grondafsluiter..."
>

<div id="results"></div>

</div>

<script>

let DATA = [];

const CSV_FILES = [
    "poi_e_station.csv",
    "poi_e_verdeelkast.csv",
    "poi_g_gasstation.csv",
    "poi_g_grondafsluiter.csv"
];

function parseCSV(text){

    const rows = text
        .split(/\r?\n/)
        .filter(Boolean)
        .map(row => row.split(";"));

    if(rows.length < 2){
        return [];
    }

    const header = rows.shift();

    const idxNaam =
        header.findIndex(h =>
            /naam/i.test(h)
        );

    const idxLat =
        header.findIndex(h =>
            /(latitude|lat)/i.test(h)
        );

    const idxLon =
        header.findIndex(h =>
            /(longitude|lon)/i.test(h)
        );

    return rows.map(r => {

        const raw =
            (r[idxNaam] || "").trim();

        const parts =
            raw.split(/\s*,\s*/);

        return {

            bestand : "",

            nummer :
                parts[0] || "",

            naam :
                parts[1] || "",

            straat :
                parts[2] || "",

            huisnr :
                parts[3] || "",

            postcode :
                parts[4] || "",

            plaats :
                parts[5] || "",

            lat :
                parseFloat(
                    (r[idxLat] || "")
                    .replace(",", ".")
                ),

            lon :
                parseFloat(
                    (r[idxLon] || "")
                    .replace(",", ".")
                ),

            raw

        };

    });

}

async function laadCSVBestanden(){

    DATA = [];

    for(const file of CSV_FILES){

        try{

            const response =
                await fetch(file);

            if(!response.ok){

                console.warn(
                    file + " niet gevonden"
                );

                continue;

            }

            const text =
                await response.text();

            const rows =
                parseCSV(text);

            rows.forEach(r => {

                r.bestand = file;

            });

            DATA.push(...rows);

            console.log(
                file,
                rows.length,
                "records geladen"
            );

        }
        catch(error){

            console.error(
                file,
                error
            );

        }

    }

    render("");

    document
        .getElementById("status")
        .innerText =
        `${DATA.length.toLocaleString()} locaties geladen`;

}

function render(searchText){

    const query =
        (searchText || "")
        .toLowerCase();

    const container =
        document.getElementById("results");

    container.innerHTML = "";

    const filtered =
        DATA.filter(item => {

            if(!query){
                return true;
            }

            const searchable = (

                item.raw +
                " " +
                item.bestand

            ).toLowerCase();

            return searchable.includes(query);

        });

    filtered
        .slice(0, 300)
        .forEach(item => {

            const div =
                document.createElement("div");

            div.className =
                "row";

            div.innerHTML = `

                <div class="code">
                    ${item.nummer}
                </div>

                <div>
                    ${item.naam}
                </div>

                <div class="small">
                    ${item.straat}
                    ${item.huisnr}
                    ${item.postcode}
                    ${item.plaats}
                </div>

                <div class="bestand">
                    ${item.bestand}
                </div>

            `;

            div.onclick = () => {

                if(
                    !isNaN(item.lat) &&
                    !isNaN(item.lon)
                ){

                    window.open(

                        `https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lon}`,

                        "_blank"

                    );

                }

            };

            container.appendChild(div);

        });

    document
        .getElementById("status")
        .innerText =
        `${filtered.length.toLocaleString()} resultaten van ${DATA.length.toLocaleString()} locaties`;

}

document
.getElementById("search")
.addEventListener("input", e => {

    render(
        e.target.value
    );

});

laadCSVBestanden();

</script>

</body>
</html>
